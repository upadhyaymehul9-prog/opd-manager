name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      SESSION_SECRET: ci-test-session-secret-min-32-chars-long

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Vercel deploys via `npm run build` only. Lint is run locally (`npm run lint`);
      # Next 16 ESLint rules conflict with standard fetch-on-mount patterns in this app.
      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
